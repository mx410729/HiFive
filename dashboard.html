<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HiFive 🤚 — Dashboard</title>
  <style>
    :root {
      --blue: #1A56FF; --blue-light: #E8EFFF; --blue-soft: #F4F7FF; --blue-mid: #B8CCFF;
      --navy: #1C1F6E; --text: #1A1F36; --text-muted: #6B7394; --white: #FFFFFF; --bg: #FAFBFF;
      --separator: rgba(26, 86, 255, 0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
      max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column;
      box-shadow: 0 0 60px rgba(26,86,255,0.08);
    }
    header { background: var(--white); border-bottom: 1px solid var(--separator); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header-back { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; }
    .header-title { font-family: 'Syne', sans-serif; font-weight: 800; }
    .header-search-input { flex: 1; padding: 10px 16px; border-radius: 100px; border: 1px solid var(--separator); background: var(--bg); outline: none; display: none; }
    .header-search-input.visible { display: block; }
    .tabs { background: var(--white); display: flex; border-bottom: 1px solid var(--separator); }
    .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 0.82rem; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; }
    .tab.active { color: var(--navy); font-weight: 700; border-bottom-color: var(--navy); }
    .content-area { flex: 1; position: relative; overflow: hidden; display: flex; }
    .people-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .alpha-bar { width: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--text-muted); cursor: pointer; }
    .section-letter { padding: 10px 20px; font-size: 0.7rem; font-weight: 700; background: var(--bg); border-bottom: 1px solid var(--separator); }
    .person-row { display: flex; align-items: center; gap: 14px; padding: 12px 20px; background: var(--white); border-bottom: 1px solid var(--separator); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue-mid); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; position: relative; }
    .status-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; }
    .status-online { background: #00C853; }
    .status-offline { background: #9E9E9E; }
    .person-name { flex: 1; font-size: 0.9rem; }
    .add-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
    .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--navy); display: flex; justify-content: space-around; padding: 12px 0; z-index: 30; }
    .nav-item { color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item.active { color: white; }
    .nav-label { font-size: 0.6rem; }
    .chat-pane { position: fixed; top: 100%; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 50; transition: top 0.3s; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
    .chat-pane.open { top: 0; }
    .chat-header { background: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--separator); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .chat-input-area { background: white; padding: 12px 20px; border-top: 1px solid var(--separator); display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 10px 16px; border-radius: 20px; border: 1px solid var(--separator); outline: none; }
    .chat-send { background: var(--blue); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    .msg-wrap { max-width: 80%; display: flex; flex-direction: column; gap: 4px; }
    .msg-wrap.mine { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.theirs { align-self: flex-start; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 0.9rem; }
    .msg-wrap.mine .msg-bubble { background: var(--blue); color: white; }
    .msg-wrap.theirs .msg-bubble { background: white; border: 1px solid var(--separator); }
    .icebreaker-card { background: var(--blue-soft); border: 1px solid var(--blue-mid); border-radius: 16px; padding: 20px; text-align: center; }
    .profile-setup-overlay { position: fixed; inset: 0; background: white; z-index: 100; display: none; flex-direction: column; padding: 40px; }
    .profile-setup-overlay.visible { display: flex; }
    .setup-input { width: 100%; padding: 12px; border: 1px solid var(--separator); border-radius: 8px; margin-bottom: 16px; }
    .setup-btn { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 100px; cursor: pointer; font-weight: 700; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 10px 20px; border-radius: 100px; font-size: 0.8rem; z-index: 1000; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="header-back">← Home</a>
    <div class="header-title">HiFive 🤚</div>
    <input type="text" id="live-search" class="header-search-input" placeholder="Search friends..." />
  </header>
  <div class="tabs">
    <div class="tab active" id="tab-friends" onclick="switchTab('friends')">Friends</div>
    <div class="tab" id="tab-requests" onclick="switchTab('requests')">Requests</div>
    <div class="tab" id="tab-search" onclick="switchTab('search')">Search</div>
  </div>
  <div class="content-area">
    <div class="people-list" id="people-list"></div>
    <div class="alpha-bar" id="alpha-bar"></div>
  </div>
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location='index.html'"><span class="nav-label">Home</span></div>
    <div class="nav-item active" onclick="switchTab('friends')"><span class="nav-label">Friends</span></div>
    <div class="nav-item" onclick="switchTab('search')"><span class="nav-label">Search</span></div>
    <div class="nav-item" onclick="switchTab('profile')"><span class="nav-label">Profile</span></div>
  </nav>

  <div class="chat-pane" id="chat-pane">
    <div class="chat-header"><div class="chat-back" onclick="closeChat()">←</div><div class="chat-title" id="chat-title">Chat</div></div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" class="chat-input" placeholder="Message..." disabled />
      <button id="chat-send" class="chat-send" disabled>→</button>
    </div>
  </div>

  <div class="profile-setup-overlay" id="profile-setup-overlay">
    <h2>Welcome!</h2><p>Finish your profile.</p>
    <input id="setup-fn" class="setup-input" placeholder="First Name" />
    <input id="setup-ln" class="setup-input" placeholder="Last Name" />
    <button class="setup-btn" onclick="saveInitialProfile()">Go!</button>
  </div>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const API_BASE = window.location.origin;
    const AUTH0_DOMAIN = 'dev-gnf25xr2lt37ohtu.us.auth0.com';
    const AUTH0_CLIENT_ID = 'pOTTptqjjjExXAGuHaFXExOaVjgiWa4U';
    let auth0Client, token, myUsername, socket, currentChat;
    let friendsData = { friends: [], pendingSent: [], pendingReceived: [] };
    let people = [], currentTab = 'friends';

    async function initAuth0() {
      auth0Client = await auth0.createAuth0Client({ domain: AUTH0_DOMAIN, clientId: AUTH0_CLIENT_ID, authorizationParams: { audience: 'https://hifive-api' } });
      if (!await auth0Client.isAuthenticated()) { window.location.href = 'index.html'; return; }
      token = await auth0Client.getTokenSilently();
      const u = await auth0Client.getUser();
      myUsername = u.nickname || u.name;
      startApp();
    }

    async function startApp() {
      await Promise.all([checkProfile(), fetchFriends(), fetchUsers()]);
      initSocket();
    }

    function initSocket() {
      socket = io({ auth: { token } });
      socket.on('new_message', (msg) => {
        if (currentChat && currentChat.id === msg.conversationId) { appendMessage(msg.content, msg.sender?.username === myUsername, msg.sender?.username || 'System'); }
        else { showToast('New message!'); fetchFriends(); }
      });
      socket.on('new_friend_request', () => { showToast('New friend request!'); fetchFriends(); });
    }

    async function fetchFriends() {
      const r = await fetch(`${API_BASE}/api/friends`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.ok) { friendsData = await r.json(); renderInviteList(); }
    }
    async function fetchUsers(q='') {
      const r = await fetch(`${API_BASE}/api/users/search?q=${q}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.ok) { people = await r.json(); renderInviteList(); }
    }

    function switchTab(t) {
      currentTab = t;
      document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.id === `tab-${t}`));
      document.getElementById('live-search').style.display = t === 'search' ? 'block' : 'none';
      if (t === 'profile') renderProfileTab(); else renderInviteList();
    }

    function renderInviteList() {
      const list = document.getElementById('people-list'); list.innerHTML = '';
      let items = currentTab === 'friends' ? friendsData.friends : (currentTab === 'requests' ? friendsData.pendingReceived.map(r=>r.user) : people);
      items.forEach(p => {
        const div = document.createElement('div'); div.className = 'person-row';
        div.innerHTML = `<div class="avatar">${p.username[0].toUpperCase()}</div><div class="person-name">${p.username}</div>`;
        const btn = document.createElement('button'); btn.className = 'add-btn';
        if (currentTab === 'friends') { btn.innerHTML = '💬'; btn.onclick = () => openChat(p); }
        else if (currentTab === 'requests') { btn.innerHTML = '✓'; btn.onclick = () => acceptFriend(p.id); }
        else { btn.innerHTML = '+'; btn.onclick = () => sendReq(p.id); }
        div.appendChild(btn); list.appendChild(div);
      });
    }

    async function openChat(p) {
      document.getElementById('chat-title').textContent = p.username;
      document.getElementById('chat-pane').classList.add('open');
      const r = await fetch(`${API_BASE}/api/chat/sessions`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ targetUserId: p.id }) });
      currentChat = await r.json();
      socket.emit('join_room', { conversationId: currentChat.id });
      fetchHistory(currentChat.id);
    }

    async function fetchHistory(id) {
      const r = await fetch(`${API_BASE}/api/chat/${id}/history`, { headers: { 'Authorization': `Bearer ${token}` } });
      const hist = await r.json();
      const pane = document.getElementById('chat-messages'); pane.innerHTML = '';
      if (hist.length === 0) fetchIcebreaker(id);
      else { 
        document.getElementById('chat-input').disabled = false; document.getElementById('chat-send').disabled = false;
        hist.forEach(m => appendMessage(m.content, m.sender?.username === myUsername, m.sender?.username || 'System'));
      }
    }

    function appendMessage(txt, mine, s) {
      const p = document.getElementById('chat-messages');
      const d = document.createElement('div'); d.className = `msg-wrap ${mine?'mine':'theirs'}`;
      d.innerHTML = `<div class="msg-bubble">${txt}</div>`; p.appendChild(d); p.scrollTop = p.scrollHeight;
    }

    async function checkProfile() {
      const r = await fetch(`${API_BASE}/api/users/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
      const p = await r.json(); if (!p.firstName) document.getElementById('profile-setup-overlay').classList.add('visible');
    }

    function showToast(m) {
      const d = document.createElement('div'); d.className = 'toast'; d.textContent = m;
      document.body.appendChild(d); setTimeout(() => d.remove(), 3000);
    }
    
    function closeChat() { document.getElementById('chat-pane').classList.remove('open'); currentChat = null; }
    
    initAuth0();
  </script>
</body>
</html>
